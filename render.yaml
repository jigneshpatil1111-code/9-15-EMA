services:
  - type: web
    name: intraday-scanner
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DHAN_CLIENT_ID
        sync: false
      - key: DHAN_ACCESS_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BROKER
        value: dhan
